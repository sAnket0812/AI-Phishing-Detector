<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Phishing Command Center</title>
    <style>
        body {
            background-color: #0d1117;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin-top: 50px;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 30px;
            width: 70%;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            background-color: #161b22;
        }
        
        /* --- NEW: DASHBOARD STATS CSS --- */
        .dashboard {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 15px;
            border-bottom: 1px solid #30363d;
        }
        .stat-box {
            background-color: #0d1117;
            border: 1px solid #30363d;
            padding: 15px 30px;
            border-radius: 8px;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
        }
        .phishing-color { color: #ff4444; }
        .safe-color { color: #00ff00; }
        .total-color { color: #58a6ff; }
        /* -------------------------------- */

        input[type="text"] {
            width: 80%;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #0d1117;
            color: white;
            border: 1px solid #30363d;
            font-size: 16px;
            border-radius: 5px;
        }
        button {
            padding: 15px 30px;
            background-color: #238636;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        button:hover { background-color: #2ea043; }
        .result {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛡️ AI Phishing Command Center</h2>
        
        <div class="dashboard">
            <div class="stat-box">
                <div>TOTAL SCANS</div>
                <div class="stat-number total-color">{{ stats.total_scans }}</div>
            </div>
            <div class="stat-box">
                <div>SAFE LINKS</div>
                <div class="stat-number safe-color">{{ stats.safe_caught }}</div>
            </div>
            <div class="stat-box">
                <div>THREATS BLOCKED</div>
                <div class="stat-number phishing-color">{{ stats.phishing_caught }}</div>
            </div>
        </div>

        <form action="/check" method="POST">
            <input type="text" name="url_input" placeholder="Paste suspicious link here..." required>
            <br>
            <button type="submit">Initiate AI Scan</button>
        </form>
        
        <div class="result">
            {{ result }}
            <br><br>
            <span style="color: #ff4444; font-size: 18px;">{{ warning }}</span>
        </div>
    </div>
</body>
</html>
